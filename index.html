<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아이들을 위한 받아쓰기 놀이터</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="card header">
        <p class="eyebrow">🌈 오늘도 즐겁게!</p>
        <h1>받아쓰기 놀이터</h1>
        <p class="subtitle">듣기 → 쓰기 → 칭찬 받기!</p>
      </header>

      <section class="card top-banner-grid" aria-label="오늘의 배너 영역">
        <article class="champion-card">
          <p class="banner-title">👑 오늘의 챔피언</p>
          <p id="champion-text" class="banner-value">-</p>
        </article>
        <article class="quote-card">
          <p class="banner-title">💬 오늘의 한마디</p>
          <p id="daily-quote" class="banner-value">-</p>
        </article>
        <article id="record-banner" class="record-banner hidden" aria-live="polite"></article>
      </section>

      <main class="layout-grid">
        <section class="card kids-panel" aria-labelledby="kids-title">
          <div class="section-title-row">
            <h2 id="kids-title">🧒 친구 프로필</h2>
            <button id="add-child-btn" class="btn btn-soft" type="button">+ 친구 추가</button>
          </div>
          <div id="children-list" class="children-list" aria-live="polite"></div>
        </section>

        <section class="card game-panel" aria-labelledby="game-title">
          <h2 id="game-title">🎧 받아쓰기 게임</h2>

          <div class="question-meta">
            <span id="question-progress">1 / 10</span>
            <span id="question-category">카테고리: 자연</span>
            <span id="question-difficulty">난이도: ⭐</span>
          </div>

          <div class="progress-block">
            <div class="progress-label-row">
              <span id="session-progress-text">오늘 진행 0 / 10</span>
              <span id="replay-count">다시 듣기 0/2</span>
            </div>
            <div class="progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
              <div id="session-progress-fill" class="progress-bar-fill"></div>
            </div>
          </div>

          <p id="play-status" class="play-status">문제를 들어보세요</p>

          <div class="play-controls">
            <button id="play-btn" class="btn btn-play" type="button">문제 불러줘</button>
            <button id="replay-btn" class="btn btn-replay" type="button">한 번 더!</button>
          </div>

          <div class="answer-section">
            <label for="answer-input">들은 단어를 써볼까?</label>
            <input id="answer-input" type="text" maxlength="20" autocomplete="off" placeholder="단어를 입력해요" />

            <div class="answer-buttons">
              <button id="submit-btn" class="btn btn-submit" type="button">제출하기</button>
              <button id="next-btn" class="btn btn-next" type="button">다음 문제</button>
            </div>

            <label class="toggle-row" for="auto-next-toggle">
              <input id="auto-next-toggle" type="checkbox" />
              정답 확인 후 자동으로 다음 문제로 이동
            </label>

            <div id="feedback-box" class="feedback-box" aria-live="polite">
              <p id="feedback-main" class="feedback-main">준비되면 문제를 재생해보자!</p>
              <p id="feedback-sub" class="feedback-sub"></p>
              <div id="sparkles" class="sparkles" aria-hidden="true"></div>
            </div>
            <p id="streak-banner" class="streak-banner hidden" aria-live="polite"></p>
          </div>
        </section>

        <section class="card side-panel" aria-labelledby="summary-title">
          <h2 id="summary-title">🏅 오늘의 요약</h2>
          <div class="summary-grid">
            <article class="mini-card mint">
              <p class="mini-title">누적 점수</p>
              <p id="score-value" class="mini-value">0점</p>
            </article>
            <article class="mini-card pink">
              <p class="mini-title">현재 연속 정답</p>
              <p id="streak-value" class="mini-value">0회</p>
            </article>
            <article class="mini-card sky">
              <p class="mini-title">오늘 맞은 개수</p>
              <p id="today-correct-value" class="mini-value">0개</p>
            </article>
            <article class="mini-card yellow">
              <p class="mini-title">정답률</p>
              <p id="accuracy-value" class="mini-value">0%</p>
            </article>
          </div>

          <div class="leaderboard-wrap">
            <h3>친구 랭킹</h3>
            <ol id="leaderboard-list" class="leaderboard-list"></ol>
          </div>
        </section>
      </main>

      <section id="session-result" class="card session-result hidden" aria-live="polite">
        <h2>🎉 오늘 세션 완료!</h2>
        <p id="session-result-summary">-</p>
        <button id="restart-session-btn" class="btn btn-soft" type="button">새 세션 시작</button>
      </section>
    </div>

    <template id="child-card-template">
      <article class="child-card">
        <button class="child-select-btn" type="button">
          <div class="child-top">
            <span class="child-avatar"></span>
            <div>
              <p class="child-name"></p>
              <p class="child-score"></p>
            </div>
          </div>
          <div class="child-stats"></div>
        </button>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
